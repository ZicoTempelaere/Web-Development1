<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Invulformulier</title>
</head>
<body>
<form>
    <fieldset>
        <legend>Persoonlijke informatie</legend>
        <div>
            <label for="voornaam">Voornaam*:</label>
            <input type="text" id="voornaam" placeholder="Your first name" autofocus>
        </div>
        <div>
            <label for="familienaam">Familienaam*:</label>
            <input type="text" id="familienaam" placeholder="Your last name">
        </div>
    </fieldset>

    <fieldset>
        <legend>Sport</legend>
        <p>Welke sport beoefen je?</p>
        <input type="checkbox" id="lopen"> <label for="lopen" style="width:auto;">Lopen</label><br>
        <input type="checkbox" id="zwemmen"> <label for="zwemmen" style="width:auto;">Zwemmen</label><br>
        <input type="checkbox" id="roeien"> <label for="roeien" style="width:auto;">Roeien</label>
    </fieldset>

    <fieldset>
        <legend>Communicatievoorkeur</legend>
        <p>Hoe kunnen we je bereiken?</p>
        <input type="radio" name="contact" id="post"> <label for="post" style="width:auto;">Per post</label><br>
        <input type="radio" name="contact" id="email_pref"> <label for="email_pref" style="width:auto;">E-mail</label>
    </fieldset>

    <fieldset>
        <legend>Favorieten</legend>
        <div>
            <label for="film">Favoriete film:</label>
            <input type="text" id="film">
        </div>
        <div>
            <label for="quote">Favoriete quote:</label>
            <input type="text" id="quote" placeholder="Schrijf je favoriete quote">
        </div>
        <div>
            <label for="eten">Favoriete eten:</label>
            <select id="eten" size="3">
                <option>Hamburger</option>
                <option>Hot-dog</option>
                <option>Pizza</option>
            </select>
        </div>
        <div>
            <label for="browser">Favoriete browser:</label>
            <input type="text" id="browser">
        </div>
    </fieldset>

    <fieldset>
        <legend>Beveiliging & contact</legend>
        <div>
            <label for="ww">Wachtwoord*:</label>
            <input type="password" id="ww">
        </div>
        <div>
            <label for="mail">E-mailadres:</label>
            <input type="email" id="mail" placeholder="Geef je e-mailadres in">
        </div>
        <div>
            <label for="site">Favoriete site:</label>
            <input type="url" id="site" placeholder="Geef de URL van je favoriete">
        </div>
    </fieldset>

    <fieldset>
        <legend>Extra informatie</legend>
        <div>
            <label for="getal1">Favoriete getal tussen 1-10:</label>
            <input type="number" id="getal1" min="1" max="10">
        </div>
        <div>
            <label for="getal2">Favoriete getal tussen 11-1000:</label>
            <input type="range" id="getal2" min="11" max="1000">
        </div>
        <div>
            <label for="geboren">Wanneer ben je geboren?</label>
            <input type="date" id="geboren">
        </div>
        <div>
            <label for="postcode">Belgische postcode*:</label>
            <input type="text" id="postcode" name="postcode" placeholder="voer heir je postcode in" pattern="^(1[0-9]{3}|[2-8][0-9]{3}|9[0-8][0-9]{2}|99[0-8][0-9]|999[0-2])$">
        </div>
    </fieldset>

    <fieldset>
        <legend>Varia</legend>
        <div>
            <label for="zoeken">Zoeken naar iets:</label>
            <input type="search" id="zoeken">
        </div>
        <div>
            <label for="kleur">Wat is je lievelingskleur?</label>
            <input type="color" id="kleur" value="#000000">
        </div>
        <div>
            <input type="file">
        </div>
    </fieldset>

    <input type="submit" value="Submit">
</form>
</body>
</html>
