<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Formwaarden</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
<label for="roker">
    Is roker <input type="checkbox" id="roker">
</label>

<div>
    <p>Moedertaal</p>
    <label>Nederlands<input type="radio" name="taal" value="Nederlands"></label>
    <label>Frans<input type="radio" name="taal" value="Frans"></label>
    <label>Engels<input type="radio" name="taal" value="Engels"></label>
</div>
<div>
    <p>Favoriete buurland</p>
    <select id="buurland">
        <option value="nl">Nederland</option>
        <option value="fr">Frankrijk</option>
        <option value="du">Duitsland</option>
    </select>
</div>
<div>
    <p>Bestelling</p>
    <select id="bestelling" multiple>
        <option>aardappelen</option>
        <option>brood</option>
        <option>melk</option>
        <option>biefstuk</option>
        <option>chips</option>
        <option>krant</option>
    </select>
</div>

<button id="toon">Toon resultaat</button>
<script src="scripts/script.js"></script>
</body>
</html>
